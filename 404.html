<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Fran Duran</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
</head>
<body>
    <header>
        <picture>
            <source srcset="assets/FD_Logotipo.webp" type="image/webp">
            <img src="assets/FD_Logotipo.png" alt="Fran Duran logo" width="240" height="240" loading="eager">
        </picture>
    </header>
    <main class="content-wrapper" style="justify-content: center; text-align: center; padding: 60px 20px;">
        <article>
            <h2 data-i18n="error_title">404 - Page Not Found</h2>
            <p data-i18n="error_text">The page you are looking for does not exist.</p>
            <p><a href="/" data-i18n="error_link">Go back to the homepage</a></p>
        </article>
    </main>
    <footer>
        <p>All rights reserved &copy;2026</p>
    </footer>
    <script>
        // Simple theme persistence for 404 page
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            document.body.classList.add('tema-oscuro');
            const logo = document.querySelector('header img');
            const source = document.querySelector('header picture source');
            if (logo) logo.src = 'assets/FD_Logotipo_White.png';
            if (source) source.srcset = 'assets/FD_Logotipo_White.webp';
        }
        // Simple i18n for 404 page
        const savedLang = localStorage.getItem('lang');
        const browserLang = navigator.language.startsWith('es') ? 'es' : 'en';
        const lang = savedLang || browserLang;
        if (lang === 'es') {
            document.documentElement.lang = 'es';
            const t = {
                error_title: '404 - Página no encontrada',
                error_text: 'La página que buscas no existe.',
                error_link: 'Volver a la página principal'
            };
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });
        }
    </script>
</body>
</html>
